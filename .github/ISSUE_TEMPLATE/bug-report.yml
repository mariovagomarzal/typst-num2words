name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: >-
        Provide a minimal Typst code snippet that reproduces the issue.
      render: typst
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: typst-version
    attributes:
      label: Typst version
      placeholder: "e.g., 0.14.0"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "e.g., 0.1.0"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, screenshots, or error messages.
    validations:
      required: false
